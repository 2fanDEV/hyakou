name: Setup mise and pnpm
description: Install project tools from mise.toml and make pnpm available.

runs:
  using: composite
  steps:
    - name: Setup mise
      uses: jdx/mise-action@v4
      with:
        install: true
        cache: true
    - name: setup pnpm store cache
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        cache-dependency-path: frontend/pnpm-lock.yaml
