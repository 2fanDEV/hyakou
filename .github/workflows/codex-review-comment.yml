name: Codex Review Comment

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment-codex-review:
    runs-on: ubuntu-latest
    steps:
      - name: Comment codex review trigger
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) {
              core.setFailed("No pull_request payload found for this event.");
              return;
            }

            const pr = context.payload.pull_request;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: "@codex review",
              });
            } catch (error) {
              if (error.status === 403) {
                core.setFailed(
                  [
                    "createComment failed with 403: Resource not accessible by integration.",
                    `event=${context.eventName}`,
                    `actor=${context.actor}`,
                    `pr=${pr.number}`,
                    `is_fork=${pr.head?.repo?.fork}`,
                    `head_repo=${pr.head?.repo?.full_name}`,
                    `base_repo=${pr.base?.repo?.full_name}`,
                    "Likely cause: GITHUB_TOKEN does not have effective write permission for this PR context.",
                    "Check repository/org Actions settings (Workflow permissions and fork PR policies).",
                  ].join("\n")
                );
                return;
              }
              throw error;
            }
