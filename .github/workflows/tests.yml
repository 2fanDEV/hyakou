name: Test Suite

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust workspace checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace

      - name: Run cargo tests
        run: RUST_LOG=debug RUST_BACKTRACE=1 HYAKOU_RUN_GPU_TESTS=0 cargo test -p hyako --all-targets --all-features -- --nocapture

      - name: Run wasm bindings unit tests
        run: cargo test -p hyako_wasm_bindings --lib -- --nocapture

  web:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run wasm bindings browser tests
        run: wasm-pack test crates/wasm_bindings --headless --chrome

      - name: Build frontend
        run: npm run build --prefix frontend
