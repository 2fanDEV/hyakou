[tools]
rust = "1.95.0"
node = "25.7.0"
pnpm = "10.33.0"
"cargo:wasm-pack" = "0.14.0"

[tasks."backend:ci"]
run = "RUST_LOGa=debug RUST_BACKTRACE=1 HYAKOU_RUN_GPU_TESTS=0 cargo test -p hyako --all-targets --all-features -- --nocapture"

[tasks."frontend:ci"]
run = [
"pnpm run format:check",
# "pnpm run lint",
"pnpm run test"
]
dir = "frontend"

[tasks."frontend:setup"]
run = "pnpm install"
dir = "frontend"

